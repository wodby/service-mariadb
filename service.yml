name: mariadb
icon: mariadb
type: db
title: MariaDB
hostname: mariadb
containers:
- name: mariadb
  image: bitnami/mariadb
  ports:
  - name: mariadb
    number: 3306
    type: tcp
  env:
  - name: DISABLE_WELCOME_MESSAGE
    value: 'true'
options:
- version: '11.3'
  tag: '11.3.2-debian-12-r1'
labels:
- mariadb
- mysql

volumes:
- name: data
  title: Data
  size: 10
  helm:
    values:
    - name: primary.persistence.size
      value: '{{volumes.data.size}}Gi'
    - name: primary.persistence.enabled
      value: true

database:
  type: mariadb
  kind: mariadb
  port: 3306
  ssl: true
  root:
    username: root
    password: '{{root_password}}'  
  db:
    name: '{{app.name}}_{{instance.name}}'
    charset: 'utf8mb4'
    collation: 'utf8mb4_unicode_520_ci'    
    actions:
      create:
        args:
        - mysql 
        - -uroot 
        - -p{{root_password}} 
        - -h{{database.host}} 
        - -e 
        - "CREATE DATABASE IF NOT EXISTS '{{database.db.name}}' CHARACTER SET '{{database.db.charset}}' COLLATE '{{database.db.collation}}';"
      drop:
        args:
        - make
        - drop-db
        - 'name="{{database.db.name}}"'
        - 'host="{{database.host}}"'
  user:
    name: '{{app.name}}_{{instance.name}}'  
    password: '{{password}}'
    actions:
      create: 
        args:
        - mysql 
        - -uroot 
        - -p{{root_password}} 
        - -h{{database.host}} 
        - -e 
        - "CREATE USER IF NOT EXISTS '{{database.user.name}}@%' IDENTIFIED BY '{{database.user.password}}';"
      drop:
        args:
        - make
        - drop-user
        - 'username=""'
        - 'host="{{database.host}}"'        
      grant:
        args:
        - make
        - grant-user-db
        - 'username="{{database.user.name}}"'
        - 'db="{{database.db.name}}"'
        - 'host="{{database.host}}"'
      revoke:
        args:
        - make
        - revoke-user-db
        - 'username="{{database.user.name}}"'
        - 'db="{{database.db.name}}"'
        - 'host="{{database.host}}"'
  charsets:
  - name: utf16
    title: UTF-16 Unicode
    collation: utf16_general_ci
  - name: utf16le 
    title: UTF-16LE Unicode
    collation: utf16le_general_ci
  - name: utf32 
    title: UTF-32 Unicode
    collation: utf32_general_ci
  - name: utf8 
    title: UTF-8 Unicode
    collation: utf8_general_ci
  - name: utf8mb4
    title: 4-Byte UTF-8 Unicode
    collation: utf8mb4_unicode_520_ci
    default: true

imports:
- name: database
  title: Database import
  init:
    mount: /docker-entrypoint-initdb.d
    env:
    - name: MYSQL_DATABASE
      value: '{{database.db.name}}'
  extensions:
  - gz
  - tar.gz
  - tgz
  - zip

backups:
- name: database
  title: Default database backup
  create:
    args:
    - make
    - backup
    - 'host="{{database.host}}"'
    - 'db="{{database.db.name}}"'
    - 'ignore="{{db_backup_ignore_tables}}"'
    - 'filepath=/var/lib/mysql/backup.sql.gz'
  upload:
    filepath: /var/lib/mysql/backup.sql.gz
    extension: sql.gz
  integrations:
  - backup-destination

tokens:
- name: root_password
  generate:
    regex: '[0-9a-z-]{32}'
- name: password
  generate:
    regex: '[0-9a-z-]{32}'

helm:
  name: bitnami
  source: oci://registry-1.docker.io/bitnamicharts/mariadb
  chart: oci://registry-1.docker.io/bitnamicharts/mariadb
  version: 18.0.2
  configurations:
  - name: mariadb
    labels: commonLabels
    annotations: primary.podAnnotations
    env: primary.extraEnvVars
    resources: primary.resources
  values:
  - name: rootPassword
    value: '{{root_password}}'
  - name: primary.createConfigmap
    value: true
  - name: auth.rootPassword
    value: '{{root_password}}'

configs: 
- name: config
  title: MySQL config
  helm: primary.configuration
  config: my.cnf

actions:
- name: mysql_upgrade
  title: Run mysql-upgrade
  args: 
  - make
  - mysql-upgrade
  - 'host="{{database.host}}"'
  type: post_upgrade
- name: mysql_check_db
  title: Run mysql-check on current database
  args: 
  - make
  - mysql-check
  - 'host="{{database.host}}"'
  - 'db="{{database.db.name}}"'  
  type: post_upgrade
- name: mysql_check_system
  title: Run mysql-check on system database
  args: 
  - make
  - mysql-check
  - 'host="{{database.host}}"'
  - 'db="mysql"'  
  type: post_upgrade


name: mariadb
type: db
title: MariaDB
hostname: mariadb
containers:
- name: mariadb
  image: wodby/mariadb
  ports:
  - name: mariadb
    number: 3306
    type: tcp
  env:
  - name: MYSQL_ROOT_PASSWORD
    value: '{{root_password}}'
    secret: true    
  - name: MARIADB_SSL_CERT
    value: '{{certificates.server.cert}}'
  - name: MARIADB_SSL_KEY
    value: '{{certificates.server.key}}'
  - name: MARIADB_SSL_CA
    value: '{{certificates.server.ca}}'    
options:
- version: 10.4
- version: 10.3
scalable: false
labels:
- mariadb
- mysql

volumes:
- name: data
  title: Data
  path: /var/lib/mysql
  size: 10

certificates:
- name: server
  days: 365000 
  length: 2048
  paths:
    cert: /etc/mysql/certificates/server-cert.pem
    key: /etc/mysql/certificates/server-key.pem
    ca: /etc/mysql/certificates/ca.pem

database:
  type: mariadb
  port: 3306
  ssl: true
  root:
    username: root
    password: '{{root_password}}'
  db:
    name: '{{app.name}}_{{instance.name}}'
    charset: 'utf8mb4'
    collation: 'utf8mb4_unicode_520_ci'    
    actions:
      create:
        args:
        - make
        - create-db
        - 'name="{{database.db.name}}"'
        - 'charset="{{database.db.charset}}"'
        - 'root_password="{{database.root.password}}"'
        - 'collation="{{database.db.collation}}"'        
        - 'host="{{database.host}}"'
      drop:
        args:
        - make
        - drop-db
        - 'root_password="{{database.root.password}}"'        
        - 'name="{{database.db.name}}"'  
        - 'host="{{database.host}}"'        
  user:
    name: '{{app.name}}_{{instance.name}}'  
    password: '{{password}}'
    actions:
      create: 
        args:
        - make
        - create-user
        - 'root_password="{{database.root.password}}"'        
        - 'username="{{database.user.name}}"'
        - 'password="{{database.user.password}}"'
        - 'host="{{database.host}}"'        
      drop:
        args:
        - make
        - drop-user
        - 'root_password="{{database.root.password}}"'        
        - 'username="{{database.user.name}}"'
        - 'host="{{database.host}}"'        
      grant:
        args:
        - make
        - grant-user-db
        - 'root_password="{{database.root.password}}"'        
        - 'username="{{database.user.name}}"'
        - 'db="{{database.db.name}}"'
        - 'host="{{database.host}}"'
      revoke:
        args:
        - make
        - revoke-user-db
        - 'root_password="{{database.root.password}}"'        
        - 'username="{{database.user.name}}"'
        - 'db="{{database.db.name}}"'
        - 'host="{{database.host}}"'

imports:
- name: database
  title: Database import
  args:
  - make
  - import
  - 'root_password="{{database.root.password}}"'      
  - 'host="{{database.host}}"'
  - 'db="{{database.db.name}}"'
  - 'user="{{database.user.name}}"'      
  - 'source="{{wodby_import_url}}"'
  extensions:
  - gz
  - tar.gz
  - tgz
  - zip

backups:
- name: database
  title: Default database backup
  create:
    args:
    - make
    - backup
    - 'root_password="{{database.root.password}}"'    
    - 'host="{{database.host}}"'
    - 'db="{{database.db.name}}"'
    - 'ignore="{{db_backup_ignore_tables}}"'
    - 'filepath=/var/lib/mysql/backup.sql.gz'
  upload:
    filepath: /var/lib/mysql/backup.sql.gz
    extension: sql.gz
  integrations:
  - backup-destination

tokens:
- name: root_password
  generate:
    regex: '[0-9a-z-]{32}'
- name: password
  generate:
    regex: '[0-9a-z-]{32}'

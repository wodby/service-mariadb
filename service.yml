name: mariadb
type: db
title: MariaDB
hostname: mariadb
containers:
- name: mariadb
  image: wodby/mariadb
  ports:
  - name: mariadb
    number: 3365
    type: tcp
  env:
  - name: MYSQL_ROOT_PASSWORD
    value: '{{root_password}}'
    secret: true    
options:
- version: 10.4
- version: 10.3
scalable: false
labels:
- mariadb
- mysql
tokens:
- name: root_password
  generate:
    regex: '[0-9a-z-]{32}'
  
volumes:
- name: data
  title: Data
  path: /var/lib/mysql
  size: 10
  
integrations:
- name: backup-destination
  title: Backups destination
  type: storage
  required: false
  multiple: true

database:
  type: mariadb
  ssl: false
  root:
    username: root
    password: '{{root_password}}'
  db:
    name: '{{wodby_app_name}}_{{wodby_app_instance_name}}'
    charset: 'utf8'
    collation: 'utf8_general_ci'    
    actions:
      create:
        args:
        - make
        - create-db
        - 'name="{{database.db.name}}"'
        - 'host="{{wodby_app_service_host}}"'
      drop:
        args:
        - make
        - drop-db
        - 'name="{{database.db.name}}"'  
        - 'host="{{wodby_app_service_host}}"'        
  user:
    name: '{{wodby_app_name}}_{{wodby_app_instance_name}}'  
    password: '{{password}}'
    actions:
      create: 
        args:
        - make
        - create-user
        - 'username="{{database.user.name}}"'
        - 'password="{{database.user.password}}"'
        - 'host="{{wodby_app_service_host}}"'        
      drop:
        args:
        - make
        - drop-user
        - 'username="{{database.user.name}}"'
        - 'host="{{wodby_app_service_host}}"'        
      grant:
        args:
        - make
        - grant-user-db
        - 'username="{{database.user.name}}"'
        - 'db="{{wodby_database_user_db}}"'
        - 'host="{{wodby_app_service_host}}"'
      revoke:
        args:
        - make
        - revoke-user-db
        - 'username="{{database.user.name}}"'
        - 'db="{{wodby_database_user_db}}"'
        - 'host="{{wodby_app_service_host}}"'

imports:
- name: database
  title: Database import
  args:
  - make
  - import
  - 'host="{{wodby_app_service_host}}"'
  - 'source="{{wodby_import_url}}"'
  extensions:
  - gz
  - tar.gz
  - tgz
  - zip

backups:
- name: database
  title: Default database backup
  create:
    args:
    - make
    - backup
    - 'host="{{wodby_app_service_host}}"'
    - 'ignore="{{db_backup_ignore_tables}}"'
    - 'filepath=/var/lib/mysql/backup.sql.gz'
  upload:
    filepath: /var/lib/mysql/backup.sql.gz
    extension: sql.gz
  integrations:
  - backup-destination

tokens:
- name: password
  generate:
    regex: '[0-9a-z-]{32}'
